<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 | Bluey</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/404.css">

    <link rel="shortcut icon" href="../img/favicon.ico" type="image/x-icon">
</head>

<body>

    <main class="error-page">

        <a href="../index.html" class="error-logo">
            <img src="../img/bluey-logo.svg" alt="Bluey">
        </a>

        <section class="error-content">

            <div class="error-visual">

                <span class="error-number">
                    404
                </span>

                <figure class="error-character">
                    <img src="../img/error404.png" alt="Bluey">
                </figure>

            </div>

            <div class="error-info">

                <p class="error-subtitle">
                    ¡Ups!
                </p>

                <h1>
                    Parece que esta aventura se perdió
                </h1>

                <p class="error-description">
                    La página que estás buscando no existe o se mudó a otro
                    lugar del mundo de Bluey.
                </p>

                <a href="../index.html" class="error-button">
                    VOLVER AL INICIO
                </a>

            </div>

        </section>

    </main>

</body>

</html>
